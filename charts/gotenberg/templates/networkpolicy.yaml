{{- if and .Values.networkPolicy .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gotenberg.fullname" . }}
  labels:
    {{- include "gotenberg.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gotenberg.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
{{- if .Values.networkPolicy.allowIngress }}
    - {}
{{- else if .Values.networkPolicy.extraIngress }}
{{- toYaml .Values.networkPolicy.extraIngress | nindent 4 }}
{{- else }}
    []
{{- end }}
  egress:
{{- if .Values.networkPolicy.allowEgress }}
    - {}
{{- else if .Values.networkPolicy.extraEgress }}
{{- toYaml .Values.networkPolicy.extraEgress | nindent 4 }}
{{- else }}
    []
{{- end }}
{{- end }}
